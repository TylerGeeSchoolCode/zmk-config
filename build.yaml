  # =============================================
  # Hillside 52 Keyboard Firmware(s) - No Dongle (Left as Central)
  # =============================================
  - board: nice_nano//zmk
    shield: hillside52_left
    snippet: studio-rpc-usb-uart zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_ZMK_STUDIO=y 
    artifact-name: hillside52_left-central-zmk_studio

  - board: nice_nano//zmk
    shield: hillside52_right
    artifact-name: hillside52_right-peripheral-zmk_studio

