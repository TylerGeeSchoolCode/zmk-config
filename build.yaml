# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board plus shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:

  # Hillside 52
  # Comment out below if you do not have this board, to save build time

  # Hillside 52 Left Board (Peripheral)
  - board: nice_nano
    shield: hillside52_left

  # Hillside 52 Right Board (Peripheral)
  - board: nice_nano
    shield: hillside52_right

  # Hillside 52 Dongle (Central)
  - board: xiao_ble
    shield: hillside52_dongle
