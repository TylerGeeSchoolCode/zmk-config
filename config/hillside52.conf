# Encoders (Uncomment these two line to add support to your firmware)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow (Uncomment these two lines to add support to your firmware)
# RGB quickly drains battery power
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Boost the Bluetooth signal only if having connection issues
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable USB device stack so the keyboard can communicate over USB
#CONFIG_USB=y
#CONFIG_USB_DEVICE_STACK=y

# Enable USB HID class for keyboard input
#CONFIG_USB_HID=y

# Enable ZMK-specific USB support
#CONFIG_ZMK_USB=y

# Enable ZMK USB keyboard interface
#CONFIG_ZMK_USB_KBD=y

# ============================
# Hillside52 Split Keyboard Config
# ============================

# ----------------------------
# Split configuration
# ----------------------------
CONFIG_ZMK_SPLIT=y

# Set the role of this half (change 'CENTRAL' for the half you plug into PC)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
# CONFIG_ZMK_SPLIT_ROLE_PERIPHERAL=y  # Uncomment for the other half

# ----------------------------
# USB configuration (central half only)
# ----------------------------
CONFIG_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_HID=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_KBD=y

# ----------------------------
# Keyboard matrix / scanning
# ----------------------------
CONFIG_KSCAN=y
CONFIG_KSCAN_POLLED=y

# ----------------------------
# Basic features
# ----------------------------
CONFIG_ZMK_KEYMAP=y
CONFIG_ZMK_BEHAVIOR=y
CONFIG_ZMK_OUTPUT=y

# ----------------------------
# Battery / power management
# ----------------------------
CONFIG_ZMK_BLE=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BLE_BATTERY_SERVICE=y

# ----------------------------
# Split communication
# ----------------------------
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_USB_HID=n  # Peripheral doesn't use USB HID

# ----------------------------
# Debugging (optional)
# ----------------------------
# CONFIG_ZMK_LOG_LEVEL_DBG=y