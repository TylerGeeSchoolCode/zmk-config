# Encoders (Uncomment these two line to add support to your firmware)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow (Uncomment these two lines to add support to your firmware)
# RGB quickly drains battery power
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Boost the Bluetooth signal only if having connection issues
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable USB device stack so the keyboard can communicate over USB
#CONFIG_USB=y
#CONFIG_USB_DEVICE_STACK=y

# Enable USB HID class for keyboard input
#CONFIG_USB_HID=y

# Enable ZMK-specific USB support
#CONFIG_ZMK_USB=y

# Enable ZMK USB keyboard interface
#CONFIG_ZMK_USB_KBD=y

# Hillside52 Split Keyboard Minimal Config

# Split configuration
CONFIG_ZMK_SPLIT=y

# Role of this half: CENTRAL = plugged into PC
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
# CONFIG_ZMK_SPLIT_ROLE_PERIPHERAL=y   # uncomment if building peripheral half

# USB configuration (central only)
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# Keyboard scanning
CONFIG_KSCAN=y
CONFIG_KSCAN_POLLED=y

# Basic features
CONFIG_ZMK_KEYMAP=y