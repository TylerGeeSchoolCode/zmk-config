# Hillside52 Dongle - Central
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB for PC connection
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# BLE support for peripherals
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y

# No actual matrix scanning needed
CONFIG_KSCAN=n

# Optional: debugging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3